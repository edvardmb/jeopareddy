services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/jeopareddy.db
      - Jwt__Issuer=Jeopareddy.Api
      - Jwt__Audience=Jeopareddy.Frontend
      - Jwt__Key=change-this-production-key-to-a-long-random-secret
      - Jwt__AccessTokenMinutes=720
    volumes:
      - jeopareddy_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  jeopareddy_data:
  caddy_data:
  caddy_config:
